name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-bin

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -tags webkit2_41

      - name: Generate icon
        run: rsvg-convert -w 256 -h 256 build/appicon.svg -o build/appicon.png

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist/twitch-tts
          cp build/bin/twitch-tts dist/twitch-tts/
          cp build/appicon.png dist/twitch-tts/
          cp install.sh uninstall.sh README.md LICENSE dist/twitch-tts/
          chmod +x dist/twitch-tts/install.sh dist/twitch-tts/uninstall.sh
          cd dist && tar czf twitch-tts-${VERSION}-linux-amd64.tar.gz twitch-tts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/twitch-tts-*.tar.gz
          generate_release_notes: true
